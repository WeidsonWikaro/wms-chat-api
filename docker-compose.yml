# Postgres + pgvector — yarn docker:up
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: chat-api-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chat_api
    ports:
      - '5433:5432'
    volumes:
      - chat_api_pgdata:/var/lib/postgresql/data

volumes:
  chat_api_pgdata:
